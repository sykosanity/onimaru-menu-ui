name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Pages is configured as legacy "deploy from branch / main / root".
# classic.html + index.html at repo root are what GitHub Pages serves — not the dist/ artifact.
# Rapid pushes + cancel-in-progress used to leave a stale "in progress" Actions deployment
# that blocked later deploy jobs (even though they were redundant).

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/publish-pages-root.mjs

      - name: Verify published root bundles match dist
        run: |
          cmp -s dist/classic.html classic.html
          cmp -s dist/index.html index.html
          test -f .nojekyll

      - name: Remind if root HTML was not committed
        run: |
          if ! git diff --quiet classic.html index.html .nojekyll 2>/dev/null; then
            echo "::warning::classic.html / index.html differ from last commit."
            echo "Run 'npm run deploy:pages' locally and commit the updated root HTML so legacy Pages picks up the bundle."
          fi
