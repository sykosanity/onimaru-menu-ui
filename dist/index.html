<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onimaru Menu</title>
    <style>
      /* Visible before React mounts — Macho DUI is transparent until the app hydrates */
      #boot-keybind-fallback {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 4, 12, 0.92);
        font-family: "Segoe UI", Inter, system-ui, sans-serif;
        color: #f4f2f8;
        pointer-events: none;
      }
      #boot-keybind-fallback .boot-keybind-card {
        text-align: center;
        padding: 28px 36px;
        border-radius: 14px;
        border: 1px solid rgba(139, 92, 246, 0.35);
        background: rgba(18, 14, 28, 0.98);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        max-width: min(440px, 90vw);
      }
      #boot-keybind-fallback strong {
        display: block;
        font-size: 18px;
        margin-bottom: 10px;
        color: rgb(139, 92, 246);
      }
      #boot-keybind-fallback p {
        font-size: 14px;
        line-height: 1.5;
        color: #9b94ad;
        margin: 0 0 16px;
      }
      #boot-key-value {
        font-size: 16px;
        font-weight: 600;
        padding: 12px 16px;
        border-radius: 10px;
        background: rgba(139, 92, 246, 0.12);
        border: 1px solid rgba(139, 92, 246, 0.25);
      }
    </style>
